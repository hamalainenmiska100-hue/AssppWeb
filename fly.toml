# fly.toml app configuration file generated for assppweb on 2026-03-19T15:35:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'assppweb'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
